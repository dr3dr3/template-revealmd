<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{{pageTitle}}</title>
    {{#absoluteUrl}}
    <meta property="og:title" content="Version Slide" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="{{{absoluteUrl}}}/assets/featured-slide.jpg" />
    <meta property="og:url" content="{{{absoluteUrl}}}" />
    <link rel="shortcut icon" href="{{{absoluteUrl}}}/favicon.ico" />    
    <link rel="stylesheet" href="{{{absoluteUrl}}}/{{{themeUrl}}}" id="theme" />  
    {{/absoluteUrl}}  
    <style>
      body {
        text-align: center;
        background-color: var(--r-background-color); }
      h1 {
        padding: 100px; }
    </style>    
  </head>

  <body>
    <div class="reveal">
      <h1>Presented by André</h1>

      <ul>
        {{#files}}
        <li>
          <a href="./{{filePath}}" title="{{title}}">
            {{#title}}{{.}}{{/title}}
          </a>
        </li>
        {{/files}}
      </ul>

    </div>
  </body>
</html>
